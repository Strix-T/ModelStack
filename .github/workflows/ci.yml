name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Build desktop (electron-vite)
        run: pnpm --filter @modelstack/desktop build

      - name: Smoke scan
        run: node dist/index.js scan --json

      - name: Smoke questionnaire
        shell: bash
        env:
          MODELSTACK_INTENT_JSON: '{"primaryUseCases":["general_chat"],"inputTypes":["text"],"priority":"speed","localPreference":"prefer_local","allowsSlowSmart":true,"requiresEmbeddings":false,"requiresVision":false,"requiresImageGeneration":false}'
        run: node dist/index.js questionnaire --json

      - name: Smoke recommend
        shell: bash
        env:
          MODELSTACK_INTENT_JSON: '{"primaryUseCases":["general_chat"],"inputTypes":["text"],"priority":"speed","localPreference":"prefer_local","allowsSlowSmart":true,"requiresEmbeddings":false,"requiresVision":false,"requiresImageGeneration":false}'
        run: node dist/index.js recommend --offline-only --json
