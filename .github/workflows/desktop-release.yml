# Publishes signed (and on macOS, notarized) installers to GitHub Releases when you push a version tag (e.g. v0.1.0).
# Required secrets: see docs/DESKTOP_RELEASE.md
# Windows: add `windows-latest` to matrix.os and set WIN_CSC_* secrets when you have an Authenticode cert.

name: Desktop release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Verify macOS signing and notarization secrets
        if: matrix.os == 'macos-latest'
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for var in MAC_CSC_LINK MAC_CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            eval "val=\$$var"
            if [ -z "$val" ]; then
              echo "::error::Missing GitHub Actions secret: $var. See docs/DESKTOP_RELEASE.md"
              exit 1
            fi
          done

      - name: Verify Windows signing secrets
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          for var in WIN_CSC_LINK WIN_CSC_KEY_PASSWORD; do
            eval "val=\$$var"
            if [ -z "$val" ]; then
              echo "::error::Missing GitHub Actions secret: $var. See docs/DESKTOP_RELEASE.md"
              exit 1
            fi
          done

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint and test (root)
        run: pnpm lint && pnpm test

      - name: Build desktop
        run: pnpm --filter @modelstack/desktop build

      # Unlocks a CI keychain; avoids codesign hanging when only CSC_LINK=file is used.
      - name: Import macOS code signing certificates
        if: matrix.os == 'macos-latest'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MAC_CSC_LINK }}
          p12-password: ${{ secrets.MAC_CSC_KEY_PASSWORD }}

      - name: List code signing identities (debug)
        if: matrix.os == 'macos-latest'
        run: security find-identity -v -p codesigning

      - name: Write Windows codesign certificate (PFX)
        if: matrix.os == 'windows-latest'
        working-directory: desktop
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String($env:WIN_CSC_LINK)
          [IO.File]::WriteAllBytes((Join-Path (Get-Location) "win-codesign.pfx"), $bytes)

      - name: Package and publish (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEBUG: electron-osx-sign*
        run: pnpm exec electron-builder --config electron-builder.config.cjs --publish always

      - name: Package and publish (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CSC_LINK: win-codesign.pfx
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: pnpm exec electron-builder --config electron-builder.config.cjs --publish always
